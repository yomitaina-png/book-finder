<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まちの本屋さん — 今週の話題作</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0; --warm-white: #fff9f2;
    --brown-dark: #2c1a0e; --brown-mid: #6b3f1f;
    --brown-light: #c4956a; --brown-pale: #e8d5be;
    --accent: #c0392b; --accent-hover: #e74c3c;
    --text: #2c1a0e; --text-light: #7a5c42;
    --shadow: rgba(44,26,14,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: repeating-linear-gradient(92deg,transparent,transparent 40px,rgba(139,94,60,.03) 40px,rgba(139,94,60,.03) 41px),
      repeating-linear-gradient(180deg,transparent,transparent 80px,rgba(139,94,60,.02) 80px,rgba(139,94,60,.02) 81px);
  }
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  header { background: var(--brown-dark); padding: 22px 20px 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px var(--shadow); }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .logo { font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 20px; color: var(--cream); line-height: 1.3; }
  .logo span { display: block; font-size: 11px; font-family: 'Noto Sans JP',sans-serif; font-weight: 300; color: var(--brown-pale); letter-spacing: .15em; margin-top: 2px; }
  .date-badge { background: var(--accent); color: white; font-size: 10px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; margin-top: 4px; }
  .location-bar { background: rgba(255,255,255,.1); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: background .2s; }
  .location-bar:hover { background: rgba(255,255,255,.15); }
  .location-text { font-size: 12px; color: var(--brown-pale); flex: 1; }
  .location-text strong { color: var(--cream); font-weight: 500; }

  main { padding: 16px 16px 80px; }
  .notice-bar { background: rgba(196,149,106,.12); border: 1px solid rgba(196,149,106,.3); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: var(--text-light); line-height: 1.7; }
  .notice-bar strong { color: var(--brown-mid); }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-header h2 { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 600; }
  .rank-label { font-size: 11px; color: var(--text-light); margin-left: auto; }

  /* ローディング */
  .loading { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 16px; color: var(--text-light); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--brown-pale); border-top-color: var(--brown-mid); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; }

  /* エラー */
  .error-box { background: #fff5f5; border: 1px solid #fbb; border-radius: 12px; padding: 24px 20px; text-align: center; }
  .error-box p { color: var(--accent); font-size: 14px; margin-bottom: 8px; font-weight: 500; }
  .error-box small { color: var(--text-light); font-size: 12px; line-height: 1.8; display: block; }
  .error-box code { background: var(--brown-pale); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

  /* 本カード */
  .book-list { display: flex; flex-direction: column; gap: 12px; }
  .book-card {
    background: var(--warm-white); border-radius: 12px; padding: 14px;
    display: flex; gap: 12px; align-items: flex-start;
    box-shadow: 0 2px 8px var(--shadow); border: 1px solid rgba(196,149,106,.2);
    animation: fadeUp .4s ease both; position: relative; overflow: hidden;
  }
  .book-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--brown-pale); }
  .book-card.rank-1::before { background:#d4af37; }
  .book-card.rank-2::before { background:#a8a8a8; }
  .book-card.rank-3::before { background:#cd7f32; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .rank-badge { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:700; color:var(--brown-pale); line-height:1; min-width:26px; text-align:center; margin-top:2px; }
  .rank-badge.gold   { color:#d4af37; }
  .rank-badge.silver { color:#a8a8a8; }
  .rank-badge.bronze { color:#cd7f32; }

  .book-cover { width:62px; height:88px; border-radius:4px; box-shadow:2px 2px 8px rgba(0,0,0,.2); flex-shrink:0; overflow:hidden; background:var(--brown-pale); display:flex; align-items:center; justify-content:center; font-size:28px; }
  .book-cover img { width:100%; height:100%; object-fit:cover; display:block; }

  .book-info { flex:1; min-width:0; }
  .book-title { font-family:'Noto Serif JP',serif; font-size:13px; font-weight:600; line-height:1.45; color:var(--brown-dark); margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .book-author { font-size:11px; color:var(--text-light); margin-bottom:5px; }
  .book-meta { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-bottom:7px; }
  .publisher-tag { font-size:10px; background:var(--brown-pale); color:var(--brown-mid); padding:2px 7px; border-radius:10px; }
  .price-tag { font-size:11px; color:var(--text-light); }
  .trend-badge { font-size:10px; padding:2px 7px; border-radius:10px; margin-left:auto; white-space:nowrap; }
  .trend-up   { background:#e8f5e9; color:#2e7d32; }
  .trend-new  { background:#fff3e0; color:#e65100; }
  .trend-down { background:#fce4ec; color:#c62828; }
  .trend-stay { background:#f3f3f3; color:#666; }

  .synopsis { font-size:11px; color:var(--text-light); line-height:1.6; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; cursor:pointer; }
  .synopsis.expanded { -webkit-line-clamp:unset; }
  .synopsis-hint { font-size:10px; color:var(--brown-light); margin-bottom:8px; cursor:pointer; }

  .stock-btn {
    display:flex; align-items:center; justify-content:center; gap:6px;
    width:100%; padding:10px 12px; background:var(--accent); color:white;
    border:none; border-radius:8px; font-size:13px; font-family:'Noto Sans JP',sans-serif; font-weight:500;
    cursor:pointer; text-decoration:none; transition:all .2s;
  }
  .stock-btn:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 3px 10px rgba(192,57,43,.3); }
  .stock-btn.disabled { background:#bbb; cursor:default; }
  .stock-btn.disabled:hover { transform:none; box-shadow:none; }

  .bottom-info { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--brown-dark); padding:11px 20px; text-align:center; font-size:10px; color:var(--brown-pale); line-height:1.6; }
  .source-link { color:var(--brown-light); text-decoration:none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="logo">まちの本屋さん<span>WEEKLY BESTSELLERS</span></div>
      <div class="date-badge" id="dateLabel">読み込み中...</div>
    </div>
    <div class="location-bar" onclick="getLocation()">
      <span>📍</span>
      <span class="location-text" id="locationText"><strong>位置情報を取得</strong>して近くの書店を探す</span>
    </div>
  </header>

  <main>
    <div class="notice-bar">
      📚 <strong>日販週間ベストセラー</strong> を表示。<br>
      「近くの書店で在庫確認」ボタンで<strong>書店在庫プロジェクト</strong>に接続し、近隣書店の在庫状況を確認できます。
    </div>
    <div class="section-header">
      <h2>📊 今週のランキング</h2>
      <span class="rank-label" id="rankLabel"></span>
    </div>
    <div id="bookList" class="book-list">
      <div class="loading"><div class="spinner"></div><p>Notionからデータを読み込み中...</p></div>
    </div>
  </main>

  <div class="bottom-info">
    データ出典: <a class="source-link" href="https://www.nippan.co.jp/ranking/weekly/" target="_blank">日販週間ベストセラー</a> ／
    在庫確認: <a class="source-link" href="https://demo.openbs.jp/" target="_blank">書店在庫プロジェクト</a>
  </div>
</div>

<script>
// =====================================================
// 設定（変更が必要な場合はここだけ編集）
// =====================================================
const NOTION_TOKEN   = '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';
const DATABASE_ID    = '32d63f88fff780cf9a0decdcddc799e7';

// Notionのプロパティ名とアプリ内キーのマッピング
// Notionの列名を変えた場合はここを更新してください
const PROP_MAP = {
  title:     '書名',        // タイトル型
  rank:      '順位',        // 数値型
  prevRank:  '前週順位',    // テキスト型
  author:    '著者名',      // テキスト型
  price:     '価格',        // テキスト型
  publisher: '出版社',      // テキスト型
  coverUrl:  '書影URL',     // URL型
  isbn:      'ISBNコード',  // テキスト型
  synopsis:  'あらすじ',    // テキスト型
};

// =====================================================
// Notion APIプロキシ（CORS回避のためClaudeのAPIを経由）
// ※ GitHub Pagesで動かす場合はCORSプロキシが必要
// ここではcors-anywhereまたはallOriginsを使用
// =====================================================
async function fetchNotion() {
  const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;
  const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

  const body = JSON.stringify({
    sorts: [{ property: PROP_MAP.rank, direction: 'ascending' }]
  });

  // まず直接試みる（ローカル環境など）
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${NOTION_TOKEN}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28',
      },
      body
    });
    if (res.ok) return await res.json();
  } catch (e) {
    // CORSエラーの場合はプロキシ経由で再試行
  }

  // プロキシ経由
  const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${NOTION_TOKEN}`,
      'Content-Type': 'application/json',
      'Notion-Version': '2022-06-28',
      'x-requested-with': 'XMLHttpRequest',
    },
    body
  });
  if (!res.ok) throw new Error(`Notion API error: ${res.status}`);
  return await res.json();
}

// =====================================================
// プロパティ値の取り出し
// =====================================================
function getProp(props, key) {
  const prop = props[key];
  if (!prop) return '';
  switch (prop.type) {
    case 'title':
      return prop.title.map(t => t.plain_text).join('');
    case 'number':
      return prop.number ?? '';
    case 'rich_text':
      return prop.rich_text.map(t => t.plain_text).join('');
    case 'url':
      return prop.url ?? '';
    case 'select':
      return prop.select?.name ?? '';
    default:
      return '';
  }
}

// =====================================================
// メイン処理
// =====================================================
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const data = await fetchNotion();
    const books = data.results
      .map(page => {
        const p = page.properties;
        return {
          rank:      getProp(p, PROP_MAP.rank),
          prevRank:  String(getProp(p, PROP_MAP.prevRank)),
          title:     getProp(p, PROP_MAP.title),
          author:    getProp(p, PROP_MAP.author),
          price:     getProp(p, PROP_MAP.price),
          publisher: getProp(p, PROP_MAP.publisher),
          coverUrl:  getProp(p, PROP_MAP.coverUrl),
          isbn:      getProp(p, PROP_MAP.isbn),
          synopsis:  getProp(p, PROP_MAP.synopsis),
        };
      })
      .filter(b => b.title)
      .sort((a, b) => (a.rank || 99) - (b.rank || 99));

    document.getElementById('dateLabel').textContent = `TOP ${books.length}`;
    document.getElementById('rankLabel').textContent = `全${books.length}冊`;
    renderBooks(books);
  } catch (e) {
    console.error(e);
    document.getElementById('bookList').innerHTML = `
      <div class="error-box">
        <p>⚠️ データの読み込みに失敗しました</p>
        <small>
          考えられる原因：<br>
          ・Notionのインテグレーション接続が切れている<br>
          ・APIトークンが無効になっている<br>
          ・データベースIDが間違っている<br><br>
          エラー詳細: <code>${e.message}</code>
        </small>
      </div>`;
  }
});

// =====================================================
// 描画
// =====================================================
function getTrend(b) {
  if (!b.prevRank || b.prevRank === '-') return 'new';
  const p = parseInt(b.prevRank);
  if (isNaN(p)) return 'new';
  return p > b.rank ? 'up' : p < b.rank ? 'down' : 'stay';
}
function getEmoji(t) {
  if (t.includes('野球')||t.includes('選手')) return '⚾';
  if (t.includes('猫')||t.includes('ねこ')) return '🐱';
  if (t.includes('TOEIC')||t.includes('英語')) return '📝';
  if (t.includes('習慣')) return '💪';
  if (t.includes('サンリオ')||t.includes('キャラ')) return '🎀';
  return '📖';
}
function toggleSyn(id) {
  const el = document.getElementById(id);
  const hint = el.nextElementSibling;
  el.classList.toggle('expanded');
  hint.textContent = el.classList.contains('expanded') ? '▲ 閉じる' : '▼ 続きを読む';
}
function getLocation() {
  const el = document.getElementById('locationText');
  el.innerHTML = '⏳ 位置情報を取得中...';
  if (!navigator.geolocation) { el.innerHTML = '位置情報未対応です'; return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const la = pos.coords.latitude.toFixed(3), lo = pos.coords.longitude.toFixed(3);
      el.innerHTML = `<strong>現在地取得済み</strong>（${la}, ${lo}） — ボタンで近隣書店の在庫を確認`;
    },
    () => { el.innerHTML = '位置情報の取得に失敗しました'; }
  );
}

function renderBooks(books) {
  document.getElementById('bookList').innerHTML = books.map((b, i) => {
    const tr = getTrend(b);
    const tl = tr==='new' ? '✦ NEW' : tr==='up' ? `▲ 先週${b.prevRank}位` : tr==='down' ? `▼ 先週${b.prevRank}位` : `→ 先週${b.prevRank}位`;
    const tc = tr==='up' ? 'trend-up' : tr==='new' ? 'trend-new' : tr==='down' ? 'trend-down' : 'trend-stay';
    const rc = b.rank<=3 ? `rank-${b.rank}` : '';
    const rcolor = b.rank===1 ? 'gold' : b.rank===2 ? 'silver' : b.rank===3 ? 'bronze' : '';
    const cover = b.coverUrl
      ? `<img src="${b.coverUrl}" alt="" onerror="this.parentElement.innerHTML='${getEmoji(b.title)}'">`
      : getEmoji(b.title);
    const btn = b.isbn
      ? `<a class="stock-btn" href="https://demo.openbs.jp/${b.isbn}" target="_blank">🏪 近くの書店で在庫確認</a>`
      : `<div class="stock-btn disabled">ISBN未登録</div>`;
    const sid = `s${i}`;
    const syn = b.synopsis
      ? `<div class="synopsis" id="${sid}" onclick="toggleSyn('${sid}')">${b.synopsis}</div>
         <div class="synopsis-hint" onclick="toggleSyn('${sid}')">▼ 続きを読む</div>`
      : '';
    return `
      <div class="book-card ${rc}" style="animation-delay:${i*45}ms">
        <div class="rank-badge ${rcolor}">${b.rank}</div>
        <div class="book-cover">${cover}</div>
        <div class="book-info">
          <div class="book-title">${b.title}</div>
          ${b.author ? `<div class="book-author">${b.author}</div>` : ''}
          <div class="book-meta">
            ${b.publisher ? `<span class="publisher-tag">${b.publisher}</span>` : ''}
            ${b.price ? `<span class="price-tag">${b.price}</span>` : ''}
            <span class="trend-badge ${tc}">${tl}</span>
          </div>
          ${syn}${btn}
        </div>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
